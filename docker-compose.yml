services:
  postgres:
    image: postgres:15-alpine
    container_name: los_postgres
    environment:
      POSTGRES_DB: los_db
      POSTGRES_USER: los_user
      POSTGRES_PASSWORD: los_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U los_user -d los_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: los_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass los_redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "los_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: los_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: los_rabbit
      RABBITMQ_DEFAULT_PASS: los_rabbit_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: los_minio
    environment:
      MINIO_ROOT_USER: los_minio_user
      MINIO_ROOT_PASSWORD: los_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: los_backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://los_user:los_password@postgres:5432/los_db?sslmode=disable
      - REDIS_URL=redis://:los_redis_password@redis:6379
      - RABBITMQ_URL=amqp://los_rabbit:los_rabbit_password@rabbitmq:5672
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=los_minio_user
      - MINIO_SECRET_KEY=los_minio_password
      - JWT_PRIVATE_KEY=los-jwt-secret-change-in-production-min-32-chars
      - JWT_PUBLIC_KEY=los-jwt-secret-change-in-production-min-32-chars
      - AES_KEY=0123456789abcdef0123456789abcdef
      - HMAC_SECRET=los-hmac-secret-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: los_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: los_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
